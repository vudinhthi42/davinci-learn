<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davinci Marketing — Learn Fast</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--sidebar:#1e1e1c;--card:#fff;--border:#e5e3dc;
  --green:#1D9E75;--green-lite:#E1F5EE;--green-dark:#085041;
  --blue:#185FA5;--blue-lite:#E6F1FB;
  --orange:#D85A30;--orange-lite:#FAECE7;
  --purple:#534AB7;--purple-lite:#EEEDFE;
  --amber:#BA7517;--amber-lite:#FAEEDA;
  --gray:#888780;--gray-lite:#F1EFE8;
  --dark:#2C2C2A;--text:#3a3a38;
  --sw:272px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;transition:padding-left .3s}
body.open{padding-left:var(--sw)}

/* SIDEBAR */
#sb{width:var(--sw);min-height:100vh;background:var(--sidebar);position:fixed;top:0;left:0;overflow-y:auto;z-index:200;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .3s}
body.open #sb{transform:translateX(0)}
#sbh{padding:18px 18px 12px;border-bottom:1px solid #2a2a28}
#sbh h1{font-size:15px;font-weight:700;color:#fff;line-height:1.3}
#sbh p{font-size:11px;color:#777;margin-top:3px}
#sbp{padding:10px 18px;border-bottom:1px solid #2a2a28}
.po{height:3px;background:#333;border-radius:2px;margin-bottom:5px}
.pi{height:3px;background:var(--green);border-radius:2px;transition:width .4s}
.pt{font-size:11px;color:#666}
#nav{flex:1;padding:6px 0 20px}
.pl{font-size:10px;font-weight:700;color:#444;padding:10px 18px 3px;text-transform:uppercase;letter-spacing:.06em}
.ni{display:flex;align-items:center;gap:9px;padding:7px 18px;cursor:pointer;border-left:2px solid transparent;transition:background .12s}
.ni:hover{background:#252523}
.ni.active{background:#232321;border-left-color:var(--green)}
.ni.done .nd{background:var(--green)}
.nd{width:7px;height:7px;border-radius:50%;background:#383836;flex-shrink:0}
.ni.active .nd{background:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.2)}
.nl{font-size:12.5px;color:#bbb;line-height:1.3;flex:1}
.ni.active .nl{color:#fff;font-weight:500}

/* TOGGLE */
#tog{position:fixed;top:14px;left:14px;z-index:300;width:36px;height:36px;border-radius:8px;background:var(--dark);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:left .3s}
body.open #tog{left:calc(var(--sw) + 10px)}
#tog svg{width:18px;height:18px;stroke:#ccc;fill:none;stroke-width:2;stroke-linecap:round}
#tog:hover{background:#444}

/* MAIN */
#main{max-width:780px;margin:0 auto;padding:28px 32px 60px}
@media(max-width:600px){#main{padding:20px 16px 50px}}

/* LESSON HEADER */
.ptag{display:inline-block;font-size:11px;font-weight:600;background:var(--green-lite);color:var(--green-dark);padding:3px 10px;border-radius:20px;margin-bottom:10px}
.ltitle{font-size:24px;font-weight:700;color:var(--dark);line-height:1.3;margin-bottom:8px}
.stag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--green-lite);color:var(--green-dark)}

/* COMPONENTS */
.comp{margin-top:18px;animation:fi .4s ease}
.comp.hidden{display:none}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 22px;margin-bottom:14px}
.cc{background:var(--green-lite);border-color:var(--green);border-left-width:3px}
.cc p{font-size:15px;font-weight:600;color:var(--dark);line-height:1.75}
.ic{background:var(--blue-lite);border-color:var(--blue);border-left-width:3px;font-size:13px;color:#0c447c;line-height:1.6}
h3{font-size:12px;font-weight:700;color:var(--gray);margin:18px 0 8px;text-transform:uppercase;letter-spacing:.05em}
p.body{font-size:14px;line-height:1.7;margin-bottom:10px}

/* TABLE */
.t{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:13px}
.t th{background:var(--green);color:#fff;padding:7px 11px;text-align:left;font-weight:600;font-size:12px}
.t td{padding:7px 11px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5}
.t tr:nth-child(even) td{background:var(--green-lite)}
.t tr:last-child td{border-bottom:none}

/* QUIZ */
.qw{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px 22px;margin-bottom:14px}
.qct{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.qqt{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:12px;line-height:1.55}
.qos{display:flex;flex-direction:column;gap:6px}
.qb{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 13px;cursor:pointer;font-size:13px;text-align:left;transition:all .15s;line-height:1.5;width:100%}
.qb:hover:not(:disabled){background:var(--gray-lite);border-color:#bbb}
.qb.correct{background:var(--green-lite);border-color:var(--green);color:var(--green-dark);font-weight:500}
.qb.wrong{background:#FCEBEB;border-color:#E24B4A;color:#501313}
.qb:disabled{cursor:default}
.qfb{font-size:13px;padding:9px 13px;border-radius:8px;margin-top:8px;display:none;line-height:1.5}
.qfb.ok{background:var(--green-lite);color:var(--green-dark);display:block}
.qfb.no{background:var(--orange-lite);color:#7a2010;display:block}
.qsb{text-align:center;padding:18px;background:var(--green-lite);border-radius:10px;margin-top:4px;display:none}
.sbig{font-size:34px;font-weight:700;color:var(--green-dark)}
.smsg{font-size:13px;color:var(--green-dark);margin-top:4px}

/* NOTES */
.nta{width:100%;min-height:70px;border:1px solid var(--border);border-radius:8px;padding:11px;font-size:13px;font-family:inherit;resize:vertical;background:var(--card);color:var(--text);line-height:1.5}
.nta:focus{outline:none;border-color:var(--green)}
.nsv{font-size:11px;color:var(--green);margin-top:4px;opacity:0;transition:opacity .3s}

/* BUTTONS */
.br{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;align-items:center}
.btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--gray-lite)}
.btn-g{background:var(--green);color:#fff;border-color:var(--green)}
.btn-g:hover{background:#168a62}
.btn-d{background:var(--green);color:#fff;border-color:var(--green);font-size:14px;font-weight:600;padding:10px 22px}
.btn-d.fin{background:var(--gray-lite);color:var(--gray);border-color:var(--border)}
.btn-r{background:var(--green-lite);color:var(--green-dark);border:1px solid var(--green);font-size:13px;font-weight:500;padding:8px 18px;border-radius:8px;cursor:pointer;margin-top:14px;transition:all .15s}
.btn-r:hover{background:var(--green);color:#fff}

/* REFLECTION */
.ref-item{margin-bottom:10px}
.ref-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.ref-label.current{color:var(--amber)}
.ref-label.action{color:var(--green)}

/* OVERVIEW */
.og{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.oc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .15s}
.oc:hover{border-color:var(--green)}
.oc.done{border-color:var(--green);background:var(--green-lite)}
.os{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.ot{font-size:13px;font-weight:600;color:var(--dark);line-height:1.35}
.ost{font-size:11px;font-weight:600;margin-top:5px}
.sdone{color:var(--green)}.stodo{color:var(--amber)}
@media(max-width:500px){.og{grid-template-columns:1fr}}
</style>
</head>

  ptag:'Marketing Cơ Bản',srcL:'Marketing căn bản',
  concept:'Bạn đang cố bán cho TẤT CẢ MỌI NGƯỜI. Đó chính là lý do KHÔNG AI mua.\nKhi bạn nói với cả thế giới, bạn không nói với ai cả.\nSegmentation = ngừng gào to giữa chợ, bắt đầu thì thầm vào đúng tai người cần nghe.',
  comps:[

<tr><td>Tỷ lệ chốt thấp, sale kiệt sức tư vấn</td><td>Khách tự nhận ra mình cần, chốt nhanh</td></tr>

    // EXAMPLES

<tr><td><b>Gym</b></td><td>"Phòng tập cho mọi lứa tuổi"</td><td>"Tăng cơ cho nam văn phòng 25–35, tập 45 phút/buổi"</td></tr>
<tr><td><b>Tiếng Anh</b></td><td>"Tiếng Anh giao tiếp cho người mất gốc"</td><td>"Tiếng Anh phỏng vấn cho kỹ sư IT muốn nhảy việc công ty nước ngoài"</td></tr>

    {q:"Segmentation thực chất là gì?",opts:["Chia khách hàng theo độ tuổi và giới tính","Chia thị trường thành các nhóm có chung đặc điểm để truyền thông trúng đích","Chọn nhóm khách hàng giàu nhất để bán","Tạo nhiều phiên bản sản phẩm cho nhiều nhóm khác nhau"],correct:1,explain:"B đúng vì segmentation là cách chia nhóm dựa trên đặc điểm chung (nhu cầu, hành vi, tâm lý, không chỉ nhân khẩu học). A sai vì đó chỉ là 1 tiêu chí. C là targeting. D là hệ quả, không phải bản chất."},
    {q:"Câu nào là dấu hiệu một doanh nghiệp CHƯA segment?",opts:["Họ có 3 landing page khác nhau cho 3 nhóm khách","Họ nói \"sản phẩm phù hợp với tất cả mọi người\"","Họ từ chối nhận khách không thuộc nhóm mục tiêu","Họ định giá cao hơn đối thủ 50%"],correct:1,explain:"\"Phù hợp với tất cả\" = không phù hợp với ai cụ thể — đặc trưng kinh điển của doanh nghiệp chưa segment."},

    {q:"Sự khác biệt giữa Segmentation và Targeting là gì?",opts:["Segmentation = chia nhóm. Targeting = chọn nhóm nào để tập trung","Segmentation và Targeting là một","Segmentation = chọn nhóm. Targeting = chia nhóm","Segmentation dành cho B2C, Targeting dành cho B2B"],correct:0,explain:"Đây là định nghĩa chuẩn: bạn segment trước (vẽ bản đồ thị trường), rồi target (cắm cờ vào nhóm chọn). 2 bước khác nhau trong quy trình STP."}

    {q:"Nếu Davinci chỉ được chọn 1 phân khúc để all-in trong 12 tháng tới, tiêu chí quan trọng nhất là gì?",opts:["Phân khúc đông nhất","Phân khúc Davinci giỏi phục vụ nhất, đủ lớn, và sẵn lòng trả học phí cao","Phân khúc cạnh tranh ít nhất","Phân khúc dễ chạy quảng cáo nhất"],correct:1,explain:"Lựa chọn đúng = giao điểm của (năng lực Davinci × quy mô × khả năng chi trả)."},

// ═══ PSYCHOGRAPHY ═══
{

const S={

function save(){
  localStorage.setItem(CK+'_done',JSON.stringify(S.done));
  localStorage.setItem(CK+'_quiz',JSON.stringify(S.quiz));
  localStorage.setItem(CK+'_quiz2',JSON.stringify(S.quiz2));
  localStorage.setItem(CK+'_notes',JSON.stringify(S.notes));
  localStorage.setItem(CK+'_ref',JSON.stringify(S.ref));
}
function markDone(id){if(!S.done.includes(id))S.done.push(id);save();rNav();uProg();}
function toggleSB(){document.body.classList.toggle('open');}

function rNav(){
  let h='<div class="pl">Bài học</div>';
  L.forEach((l,i)=>{
    if(!l.step)return;
    const done=S.done.includes(l.id),active=S.cur===i;
    h+=`<div class="ni${done?' done':''}${active?' active':''}" onclick="goTo(${i})">
      <div class="nd"></div><div class="nl">${l.step}. ${l.title}</div>
    </div>`;
  });
  document.getElementById('nav').innerHTML=h;
}
function uProg(){
  const d=S.done.length,pct=Math.round(d/TOTAL*100);
  document.getElementById('pi').style.width=pct+'%';
  document.getElementById('pt').textContent=`${d} / ${TOTAL} bài hoàn thành`;
}
function goTo(i){S.cur=i;rNav();rContent();window.scrollTo(0,0);}

function rContent(){
  const l=L[S.cur],el=document.getElementById('ct');
  if(l.type==='ov'){el.innerHTML=rOv();return;}
  el.innerHTML=rLesson(l);

}

// ═══ REVEAL ═══
function rev(lid,from){
  const l=L.find(x=>x.id===lid);
  if(from===0){
    hideBtn('c0-'+lid);
    showEl(`cb-${lid}-0`);
  } else if(from===1){
    hideBtn(`cb-${lid}-${(l.comps||[]).length-1}`);
    const qc=document.getElementById(`cq-${lid}`);
    if(qc){qc.classList.remove('hidden');rQ(l,0,'quiz','qb','qc');qc.scrollIntoView({behavior:'smooth',block:'start'});}
  } else if(from===2){
    // Quiz 2
    const qc=document.getElementById(`cq2-${lid}`);
    if(qc){qc.classList.remove('hidden');rQ(l,0,'quiz2','qb2','qc2');qc.scrollIntoView({behavior:'smooth',block:'start'});}
  } else if(from===3){
    // Reflection
    const rc=document.getElementById(`cref-${lid}`);
    if(rc){rc.classList.remove('hidden');initRef(l);rc.scrollIntoView({behavior:'smooth',block:'start'});}
    showEl(`cn2-${lid}`);
  }
}
function revBC(lid,ci){
  hideBtn(`cb-${lid}-${ci}`);
  showEl(`cb-${lid}-${ci+1}`);
}
function hideBtn(id){const el=document.getElementById(id);if(el){const b=el.querySelector('.btn-r');if(b)b.style.display='none';}}
function showEl(id){const el=document.getElementById(id);if(el){el.classList.remove('hidden');el.scrollIntoView({behavior:'smooth',block:'start'});}}

// ═══ QUIZ ENGINE ═══
function rQ(l,qi,quizKey,bodyPrefix,ctPrefix){
  const quizArr=l[quizKey];
  const storeKey=quizKey==='quiz'?'quiz':'quiz2';
  const store=S[storeKey];
  document.getElementById(`${ctPrefix}-${l.id}`).textContent=`Câu ${qi+1} / ${quizArr.length}`;
  const q=quizArr[qi];
  let h=`<div class="qqt">${q.q}</div><div class="qos">`;
  q.opts.forEach((o,oi)=>h+=`<button class="qb" id="${bodyPrefix}-${l.id}-${qi}-${oi}" onclick="ans(${l.id},${qi},${oi},'${quizKey}','${bodyPrefix}','${ctPrefix}')">${String.fromCharCode(65+oi)}. ${o}</button>`);
  h+=`</div><div class="qfb" id="qf-${bodyPrefix}-${l.id}-${qi}"></div>`;
  h+=`<div id="qn-${bodyPrefix}-${l.id}-${qi}" style="display:none;margin-top:12px">`;
  if(qi<quizArr.length-1) h+=`<button class="btn btn-g" onclick="nxtQ(${l.id},${qi},'${quizKey}','${bodyPrefix}','${ctPrefix}')">Câu tiếp theo →</button>`;
  else h+=`<button class="btn btn-g" onclick="finQ(${l.id},'${quizKey}','${bodyPrefix}','${ctPrefix}')">Xem kết quả →</button>`;
  h+=`</div>`;
  document.getElementById(`${bodyPrefix}-${l.id}`).innerHTML=h;
}

function ans(lid,qi,oi,quizKey,bodyPrefix,ctPrefix){
  const l=L.find(x=>x.id===lid);
  const storeKey=quizKey==='quiz'?'quiz':'quiz2';
  if(!S[storeKey][lid])S[storeKey][lid]=new Array(l[quizKey].length).fill(null);
  if(S[storeKey][lid][qi]!==null)return;
  S[storeKey][lid][qi]=oi;save();
  const q=l[quizKey][qi];
  document.querySelectorAll(`[id^="${bodyPrefix}-${lid}-${qi}-"]`).forEach(b=>b.disabled=true);
  const cb=document.getElementById(`${bodyPrefix}-${lid}-${qi}-${q.correct}`);
  if(cb)cb.classList.add('correct');
  if(oi!==q.correct){const wb=document.getElementById(`${bodyPrefix}-${lid}-${qi}-${oi}`);if(wb)wb.classList.add('wrong');}
  const fb=document.getElementById(`qf-${bodyPrefix}-${lid}-${qi}`);
  if(fb){const ok=oi===q.correct;fb.className=`qfb ${ok?'ok':'no'}`;fb.textContent=(ok?'':'Chưa đúng. ')+q.explain;}
  const nxt=document.getElementById(`qn-${bodyPrefix}-${lid}-${qi}`);
  if(nxt)nxt.style.display='block';
}
function nxtQ(lid,qi,quizKey,bodyPrefix,ctPrefix){const l=L.find(x=>x.id===lid);rQ(l,qi+1,quizKey,bodyPrefix,ctPrefix);}
function finQ(lid,quizKey,bodyPrefix,ctPrefix){
  const l=L.find(x=>x.id===lid);
  const storeKey=quizKey==='quiz'?'quiz':'quiz2';
  const qa=S[storeKey][lid]||[];
  const score=qa.filter((a,i)=>l[quizKey][i]&&a===l[quizKey][i].correct).length;
  const qb=document.getElementById(`${bodyPrefix}-${lid}`);if(qb)qb.style.display='none';
  const sfx=quizKey==='quiz'?'':'2';
  document.getElementById(`qc${sfx}-${lid}`).textContent='Kết quả';
  const box=document.getElementById(`qs${sfx}-${lid}`);if(!box)return;
  box.style.display='block';
  document.getElementById(`qsn${sfx}-${lid}`).textContent=`${score} / ${l[quizKey].length}`;
  const pct=score/l[quizKey].length;
  const msg=pct<0.4?'Xem lại lý thuyết rồi thử lại!':pct<0.6?'Còn vài chỗ cần củng cố.':pct<0.8?'Khá tốt!':pct<1?'Tốt lắm!':'Xuất sắc! Nắm vững rồi.';
  document.getElementById(`qsm${sfx}-${lid}`).textContent=msg;
}

// ═══ REFLECTION ENGINE ═══
function initRef(l){
  const container=document.getElementById(`ref-container-${l.id}`);
  if(container.dataset.init)return;
  container.dataset.init='1';
  if(!S.ref[l.id])S.ref[l.id]={};

  const steps=[];
  l.reflection.current.forEach((ph,i)=>steps.push({group:'current',label:i===0?'3 điều bạn đang LẦM TƯỞNG về khách hàng của Davinci':null,placeholder:ph,idx:i}));
  l.reflection.action.forEach((ph,i)=>steps.push({group:'action',label:i===0?'3 điều bạn SẼ THAY ĐỔI từ ngày mai':null,placeholder:ph,idx:i}));

  renderRefStep(l,container,steps,0);
}

function renderRefStep(l,container,steps,si){
  if(si>=steps.length){
    const d=document.createElement('div');
    d.className='comp';
    d.innerHTML=`<button class="btn btn-g" onclick="saveRef(${l.id})" style="margin-top:10px">💾 Lưu Reflection</button><div id="ref-saved-${l.id}" style="font-size:12px;color:var(--green);margin-top:6px;display:none">✓ Đã lưu!</div>`;
    container.appendChild(d);
    return;
  }
  const step=steps[si];
  if(step.label){
    const lbl=document.createElement('div');
    lbl.className='ref-label '+step.group;
    lbl.style.marginTop=si>0?'18px':'0';
    lbl.textContent=(step.group==='current'?'🟡 ':'🟢 ')+step.label;
    container.appendChild(lbl);
  }
  const item=document.createElement('div');
  item.className='ref-item comp';
  const saved=S.ref[l.id]?.[`r${si}`]||'';
  item.innerHTML=`<textarea class="nta" rows="2" placeholder="${step.placeholder}" id="ref-${l.id}-${si}" style="min-height:55px">${saved}</textarea>`;
  container.appendChild(item);

  if(si<steps.length-1){
    const btnWrap=document.createElement('div');
    const btn=document.createElement('button');
    btn.className='btn-r';
    btn.textContent='Tiếp →';
    btn.onclick=()=>{
      const ta=document.getElementById(`ref-${l.id}-${si}`);
      if(!ta.value.trim()){ta.style.borderColor='var(--orange)';ta.focus();setTimeout(()=>ta.style.borderColor='var(--border)',1500);return;}
      S.ref[l.id][`r${si}`]=ta.value;save();
      btn.style.display='none';
      renderRefStep(l,container,steps,si+1);
    };
    btnWrap.appendChild(btn);
    container.appendChild(btnWrap);
  } else {
    // Last item — auto-proceed after typing
    const ta=document.getElementById(`ref-${l.id}-${si}`);
    ta.addEventListener('input',()=>{S.ref[l.id][`r${si}`]=ta.value;save();});
    // Show save after small delay
    setTimeout(()=>renderRefStep(l,container,steps,si+1),100);
  }
}

function saveRef(lid){
  // Collect all textareas
  const l=L.find(x=>x.id===lid);
  for(let i=0;i<6;i++){
    const ta=document.getElementById(`ref-${lid}-${i}`);
    if(ta)S.ref[lid][`r${i}`]=ta.value;
  }
  save();
  document.getElementById(`ref-saved-${lid}`).style.display='block';
}

function completL(id){
  markDone(id);
  const b=document.getElementById(`bd-${id}`);
  if(b){b.classList.add('fin');b.textContent='✓ Đã hoàn thành';}
}

// ═══ INIT / RESTORE ═══
function initL(l){
  const qa=S.quiz[l.id];
  const qa2=S.quiz2[l.id];
  if(!qa&&!qa2)return;
  // Show all comps
  const c0=document.getElementById(`c0-${l.id}`);if(c0){hideBtn(`c0-${l.id}`);}
  (l.comps||[]).forEach((_,i)=>{const el=document.getElementById(`cb-${l.id}-${i}`);if(el){el.classList.remove('hidden');hideBtn(`cb-${l.id}-${i}`);}});
  // Restore Quiz 1
  if(qa){
    const qc=document.getElementById(`cq-${l.id}`);if(qc)qc.classList.remove('hidden');
    const allDone=qa.every(a=>a!==null);
    if(allDone){finQ(l.id,'quiz','qb','qc');}
    else{const nxt=qa.findIndex(a=>a===null);rQ(l,nxt,'quiz','qb','qc');}
  }
  // Restore Quiz 2
  if(qa2){
    const qc2=document.getElementById(`cq2-${l.id}`);if(qc2)qc2.classList.remove('hidden');
    const allDone2=qa2.every(a=>a!==null);
    if(allDone2){finQ(l.id,'quiz2','qb2','qc2');}
    else{const nxt=qa2.findIndex(a=>a===null);rQ(l,nxt,'quiz2','qb2','qc2');}
  }
  // Restore Reflection
  if(S.ref[l.id]&&Object.keys(S.ref[l.id]).length>0){
    const rc=document.getElementById(`cref-${l.id}`);if(rc)rc.classList.remove('hidden');
    initRef(l);
  }
  showEl(`cn2-${l.id}`);
}
